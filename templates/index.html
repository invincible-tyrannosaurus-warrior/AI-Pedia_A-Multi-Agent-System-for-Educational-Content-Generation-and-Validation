<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pedia - Agent Orchestrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h1>AI Pedia</h1>

            <div class="config-panel">
                <div class="section-title">Output Config</div>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-video" checked>
                        <span>Video Explanation</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-slides" checked>
                        <span>Presentation Slides</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-code" checked>
                        <span>Code Example</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-quizzes" checked>
                        <span>Interactive Quiz</span>
                    </label>

                    <div class="section-title" style="margin-top:20px;">Context</div>
                    <input type="file" id="file-upload" multiple style="color: white; font-size: 0.8em;">
                </div>
            </div>

            <div class="task-panel">
                <div class="section-title">Task Progression</div>
                <div id="task-list">
                    <div style="text-align:center; color:#666; font-size:0.9em; padding:20px;">
                        No active tasks.
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="chat-area" id="message-container">
                <div class="agent-box">
                    <div class="agent-header">System</div>
                    <div class="agent-body">Welcome to AI Pedia. Configure your output needs and ask a question to
                        begin.</div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input"
                    placeholder="Ask about a topic (e.g., 'Transformer Architecture')...">
                <button id="send-btn">Generate</button>
            </div>
        </div>
    </div>

    <div id="feedback-modal">
        ✅ Workflow Complete! Click to Rate
    </div>

    <div id="refine-modal" class="refine-modal">
        <div class="refine-content">
            <div class="refine-header">
                <span id="refine-title">Refining Artifact</span>
                <span class="close-refine" onclick="closeRefineModal()">&times;</span>
            </div>
            <div class="refine-body">
                <div class="refine-left" id="refine-preview">
                    <!-- Preview content goes here (Code block, Slide image, etc.) -->
                    <div style="color:#888; text-align:center; padding-top:100px;">Preview Loading...</div>
                </div>
                <div class="refine-right">
                    <div class="refine-chat-history" id="refine-chat-history">
                        <div class="agent-box">
                            <div class="agent-header">System</div>
                            <div class="agent-body">You are refining this specific artifact. Ask for changes here.</div>
                        </div>
                    </div>
                    <div class="refine-input-area">
                        <textarea id="refine-input"
                            placeholder="Describe your changes... (e.g., 'Change the chart color to red')"></textarea>
                        <button id="refine-send-btn" onclick="sendRefinement()">Refine</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const messageContainer = document.getElementById('message-container');
        const taskList = document.getElementById('task-list');
        const feedbackModal = document.getElementById('feedback-modal');
        const refineModal = document.getElementById('refine-modal');
        const refineChatHistory = document.getElementById('refine-chat-history');
        const refineInput = document.getElementById('refine-input');

        sendBtn.addEventListener('click', startGeneration);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGeneration();
        });

        // Refine Input Enter Key
        refineInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendRefinement();
            }
        });

        feedbackModal.addEventListener('click', () => {
            feedbackModal.style.display = 'none';
        });

        let currentTaskMap = {}; // Maps task_id to DOM Element (Sidebar)
        let currentAgentBox = null;
        let currentAgentId = null;
        let currentRunId = null;
        let lastSystemMsgBody = null;
        let currentRefineContext = null; // { run_id, task_id, agent, name, rawPath }
        let refineSessions = {};
        let isRestoringUiState = false;
        const VIDEO_STAGE_ORDER = ['prepare', 'convert_slides', 'generate_scripts', 'build_clips', 'encode_video'];
        const VIDEO_STAGE_LABELS = {
            prepare: 'prepare',
            convert_slides: 'convert slide',
            generate_scripts: 'generate scripts',
            build_clips: 'build clips',
            encode_video: 'encode video'
        };
        const UI_STATE_STORAGE_KEY = 'ai_pedia_ui_state_v4';
        const REFINE_SYSTEM_MESSAGE_HTML = `
            <div class="agent-box">
                <div class="agent-header">System</div>
                <div class="agent-body system-msg-body">You are refining this specific artifact. Ask for changes here.</div>
            </div>
        `;

        document.addEventListener('click', (event) => {
            const refineButton = event.target.closest('.refine-btn[data-run-id]');
            if (refineButton) {
                event.preventDefault();
                openRefineModal(
                    refineButton.dataset.runId,
                    refineButton.dataset.taskId,
                    refineButton.dataset.agent,
                    refineButton.dataset.artifactName,
                    refineButton.dataset.artifactPath
                );
            }
        });

        [document.getElementById('check-video'), document.getElementById('check-slides'), document.getElementById('check-code'), document.getElementById('check-quizzes')]
            .forEach((checkbox) => checkbox.addEventListener('change', persistUiState));
        userInput.addEventListener('input', persistUiState);
        refineInput.addEventListener('input', persistActiveRefineDraft);

        function createRefineKey(runId, taskId) {
            return `${runId}::${taskId}`;
        }

        function getArtifactExtension(rawPath = '') {
            const cleanPath = String(rawPath).split('?')[0].toLowerCase();
            const lastDot = cleanPath.lastIndexOf('.');
            return lastDot >= 0 ? cleanPath.slice(lastDot) : '';
        }

        function getArtifactNameFromPath(rawPath = '') {
            const cleanPath = String(rawPath).replace(/\\/g, '/').split('?')[0];
            const parts = cleanPath.split('/');
            return parts[parts.length - 1] || 'artifact';
        }

        function isInlineTextPreview(ext) {
            return ['.py', '.txt', '.json', '.md'].includes(ext);
        }

        function shouldDownloadArtifact(ext) {
            return ['.pptx', '.py', '.json'].includes(ext);
        }

        function buildArtifactAccessUrl(rawPath, options = {}) {
            if (!rawPath) return '#';
            const params = new URLSearchParams({ path: rawPath });
            if (options.download) params.set('download', '1');
            if (options.cacheBust) params.set('t', Date.now().toString());
            return `/artifact_file?${params.toString()}`;
        }

        function buildPresentationPreviewUrl(rawPath) {
            return `/presentation_preview?${new URLSearchParams({ path: rawPath }).toString()}`;
        }

        function inferArtifactType(rawPath, explicitType = 'file') {
            const ext = getArtifactExtension(rawPath);
            if (explicitType && explicitType !== 'file') return explicitType;
            if (ext === '.mp4') return 'video';
            if (ext === '.pptx') return 'presentation';
            if (ext === '.py') return 'code';
            return 'file';
        }

        function getArtifactSlot(meta) {
            if (meta.type === 'code' || meta.ext === '.py') return 'code';
            if (meta.type === 'presentation' || meta.ext === '.pptx') return 'presentation';
            if (meta.type === 'video' || meta.ext === '.mp4') return 'video';
            if (meta.ext) return meta.ext.slice(1);
            return meta.type || 'file';
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function refreshLastSystemMsgBody() {
            const nodes = refineChatHistory.querySelectorAll('.system-msg-body');
            lastSystemMsgBody = nodes.length ? nodes[nodes.length - 1] : null;
        }

        function ensureRefineSession(context) {
            const key = createRefineKey(context.run_id, context.task_id);
            if (!refineSessions[key]) {
                refineSessions[key] = {
                    context: { ...context },
                    chatHtml: REFINE_SYSTEM_MESSAGE_HTML,
                    draft: '',
                    preview: null,
                    isOpen: false
                };
            } else {
                refineSessions[key].context = { ...refineSessions[key].context, ...context };
                refineSessions[key].chatHtml = refineSessions[key].chatHtml || REFINE_SYSTEM_MESSAGE_HTML;
                refineSessions[key].draft = refineSessions[key].draft || '';
            }
            return refineSessions[key];
        }

        function syncCurrentRefineSessionFromDom() {
            if (!currentRefineContext) return;
            const session = ensureRefineSession(currentRefineContext);
            session.chatHtml = refineChatHistory.innerHTML || REFINE_SYSTEM_MESSAGE_HTML;
            session.draft = refineInput.value;
            session.isOpen = refineModal.style.display === 'flex';
        }

        function persistActiveRefineDraft() {
            syncCurrentRefineSessionFromDom();
            persistUiState();
        }

        function rebuildTaskMapFromDom() {
            currentTaskMap = {};
            document.querySelectorAll('#task-list .task-step[id]').forEach((el) => {
                currentTaskMap[el.id.replace('sidebar-', '')] = el;
            });
        }

        function persistUiState() {
            if (isRestoringUiState) return;
            syncCurrentRefineSessionFromDom();
            const snapshot = {
                messageHtml: messageContainer.innerHTML,
                taskHtml: taskList.innerHTML,
                currentRunId,
                currentAgentId,
                refineSessions,
                activeRefineKey: currentRefineContext ? createRefineKey(currentRefineContext.run_id, currentRefineContext.task_id) : null,
                modalOpen: refineModal.style.display === 'flex',
                config: {
                    video: document.getElementById('check-video').checked,
                    slides: document.getElementById('check-slides').checked,
                    code: document.getElementById('check-code').checked,
                    quizzes: document.getElementById('check-quizzes').checked
                },
                userInput: userInput.value
            };
            localStorage.setItem(UI_STATE_STORAGE_KEY, JSON.stringify(snapshot));
        }

        async function restoreUiState() {
            const raw = localStorage.getItem(UI_STATE_STORAGE_KEY);
            if (!raw) {
                rebuildTaskMapFromDom();
                return;
            }

            try {
                const snapshot = JSON.parse(raw);
                isRestoringUiState = true;
                if (snapshot.messageHtml) messageContainer.innerHTML = snapshot.messageHtml;
                if (snapshot.taskHtml) taskList.innerHTML = snapshot.taskHtml;
                currentRunId = snapshot.currentRunId || null;
                currentAgentId = snapshot.currentAgentId || null;
                refineSessions = snapshot.refineSessions || {};
                userInput.value = snapshot.userInput || '';
                if (snapshot.config) {
                    document.getElementById('check-video').checked = snapshot.config.video !== false;
                    document.getElementById('check-slides').checked = snapshot.config.slides !== false;
                    document.getElementById('check-code').checked = snapshot.config.code !== false;
                    document.getElementById('check-quizzes').checked = snapshot.config.quizzes !== false;
                }
                rebuildTaskMapFromDom();
                if (snapshot.modalOpen && snapshot.activeRefineKey && refineSessions[snapshot.activeRefineKey]) {
                    const context = refineSessions[snapshot.activeRefineKey].context;
                    await openRefineModal(
                        context.run_id,
                        context.task_id,
                        context.agent,
                        context.name,
                        context.rawPath
                    );
                } else {
                    refineModal.style.display = 'none';
                    currentRefineContext = null;
                }
            } catch (error) {
                console.error('Failed to restore UI state:', error);
            } finally {
                isRestoringUiState = false;
                refreshLastSystemMsgBody();
            }
        }

        function normalizeArtifactPayload(taskId, artifact, runId, agentName) {
            const rawPath = typeof artifact === 'string'
                ? artifact
                : (artifact.url || artifact.path || '');
            const ext = getArtifactExtension(rawPath);
            const type = inferArtifactType(rawPath, typeof artifact === 'object' ? artifact.type : 'file');
            return {
                taskId,
                runId: runId || currentRunId,
                agentName,
                rawPath,
                ext,
                type,
                name: typeof artifact === 'object' && artifact.name ? artifact.name : getArtifactNameFromPath(rawPath),
                slot: getArtifactSlot({ type, ext })
            };
        }

        async function loadPresentationPreview(session) {
            const response = await fetch(buildPresentationPreviewUrl(session.context.rawPath));
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(errorText || 'Failed to load presentation preview.');
            }
            const data = await response.json();
            session.preview = {
                kind: 'slides',
                sourcePath: session.context.rawPath,
                title: data.name || session.context.name,
                slides: data.slides || [],
                slideIndex: 0
            };
        }

        function renderRefineSlidePreview(session) {
            const previewContainer = document.getElementById('refine-preview');
            const slides = session.preview && session.preview.slides ? session.preview.slides : [];
            if (!slides.length) {
                previewContainer.innerHTML = '<div style="color:#ff9b9b; text-align:center; padding-top:50px;">No slide previews available.</div>';
                return;
            }

            const maxIndex = slides.length - 1;
            session.preview.slideIndex = Math.max(0, Math.min(maxIndex, session.preview.slideIndex || 0));
            const currentSlideUrl = slides[session.preview.slideIndex];
            const slideLabel = `${session.preview.slideIndex + 1} / ${slides.length}`;

            previewContainer.innerHTML = `
                <div class="refine-slide-preview">
                    <div class="refine-slide-toolbar">
                        <button class="refine-slide-nav" onclick="changeRefineSlide(-1)" ${session.preview.slideIndex === 0 ? 'disabled' : ''}>◀</button>
                        <div class="refine-slide-meta">
                            <div class="refine-slide-name">${escapeHtml(session.preview.title || session.context.name || 'Presentation')}</div>
                            <div class="refine-slide-count">Slide ${slideLabel}</div>
                        </div>
                        <button class="refine-slide-nav" onclick="changeRefineSlide(1)" ${session.preview.slideIndex === maxIndex ? 'disabled' : ''}>▶</button>
                    </div>
                    <img src="${currentSlideUrl}?t=${Date.now()}" class="refine-slide-image" alt="Presentation slide preview">
                </div>
            `;
        }

        async function renderRefinePreview(rawPath) {
            const previewContainer = document.getElementById('refine-preview');
            const session = currentRefineContext ? ensureRefineSession(currentRefineContext) : null;
            if (!session) return;

            const ext = getArtifactExtension(rawPath);
            previewContainer.innerHTML = '<div style="color:#aaa; text-align:center; padding-top:50px;">Loading Preview...</div>';

            if (ext === '.png' || ext === '.jpg' || ext === '.jpeg') {
                previewContainer.innerHTML = `<img src="${buildArtifactAccessUrl(rawPath, { cacheBust: true })}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
                return;
            }

            if (ext === '.mp4') {
                previewContainer.innerHTML = `<video controls src="${buildArtifactAccessUrl(rawPath, { cacheBust: true })}" style="width:100%; max-height:100%;"></video>`;
                return;
            }

            if (ext === '.pptx') {
                try {
                    if (!session.preview || session.preview.kind !== 'slides' || session.preview.sourcePath !== rawPath) {
                        await loadPresentationPreview(session);
                    }
                    renderRefineSlidePreview(session);
                    persistUiState();
                } catch (error) {
                    previewContainer.innerHTML = `<div style="color:red">Failed to load preview: ${escapeHtml(error)}</div>`;
                }
                return;
            }

            if (isInlineTextPreview(ext)) {
                try {
                    const response = await fetch(buildArtifactAccessUrl(rawPath, { cacheBust: true }));
                    const text = await response.text();
                    previewContainer.innerHTML = `<pre style="text-align:left; background:#1e1e1e; padding:10px; border-radius:5px; overflow:auto; height:100%; margin:0;"><code>${escapeHtml(text)}</code></pre>`;
                } catch (error) {
                    previewContainer.innerHTML = `<div style="color:red">Failed to load preview: ${escapeHtml(error)}</div>`;
                }
                return;
            }

            previewContainer.innerHTML = `<div style="text-align:center; padding-top:50px; color:#fff;">
                Preview not available for this file type.<br>
                <a href="${buildArtifactAccessUrl(rawPath, { download: true })}" target="_blank" style="color:#4a9eff">Click to download</a>
             </div>`;
        }

        async function openRefineModal(runId, taskId, agent, artifactName, artifactPath) {
            currentRefineContext = {
                run_id: runId,
                task_id: taskId,
                agent,
                name: artifactName || getArtifactNameFromPath(artifactPath),
                rawPath: artifactPath
            };
            const session = ensureRefineSession(currentRefineContext);
            session.isOpen = true;

            refineModal.style.display = 'flex';
            document.getElementById('refine-title').textContent = `Refining: ${taskId} (${agent})`;
            refineChatHistory.innerHTML = session.chatHtml || REFINE_SYSTEM_MESSAGE_HTML;
            refineInput.value = session.draft || '';
            refreshLastSystemMsgBody();

            await renderRefinePreview(session.context.rawPath);
            persistUiState();
        }

        function closeRefineModal() {
            syncCurrentRefineSessionFromDom();
            if (currentRefineContext) {
                ensureRefineSession(currentRefineContext).isOpen = false;
            }
            refineModal.style.display = 'none';
            currentRefineContext = null;
            lastSystemMsgBody = null;
            persistUiState();
        }

        async function sendRefinement() {
            const text = refineInput.value.trim();
            if (!text || !currentRefineContext) return;

            const context = { ...currentRefineContext };
            const userBox = document.createElement('div');
            userBox.className = 'agent-box user';
            userBox.innerHTML = `<div class="agent-header">User</div><div class="agent-body">${text}</div>`;
            refineChatHistory.appendChild(userBox);
            refineInput.value = '';
            refineChatHistory.scrollTop = refineChatHistory.scrollHeight;
            syncCurrentRefineSessionFromDom();
            persistUiState();

            appendRefineSystemMsg("Thinking...");

            try {
                const params = new URLSearchParams({
                    run_id: context.run_id,
                    task_id: context.task_id,
                    feedback: text
                });

                const eventSource = new EventSource(`/refine_stream?${params.toString()}`);

                eventSource.addEventListener('log', (e) => {
                    const data = JSON.parse(e.data);
                    updateRefineSystemMsg(data.content);
                });

                eventSource.addEventListener('artifact', (e) => {
                    const data = JSON.parse(e.data);
                    const updatedContext = {
                        ...context,
                        name: data.name || getArtifactNameFromPath(data.url),
                        rawPath: data.url
                    };
                    currentRefineContext = updatedContext;
                    const session = ensureRefineSession(updatedContext);
                    session.preview = null;
                    renderArtifact(data.id, data, updatedContext.run_id, updatedContext.agent);

                    setTimeout(async () => {
                        if (refineModal.style.display === 'flex' && currentRefineContext && currentRefineContext.task_id === updatedContext.task_id) {
                            await renderRefinePreview(updatedContext.rawPath);
                        }
                        persistUiState();
                    }, 1000);

                    appendRefineSystemMsg('✅ Updated Artifact Generated.');
                });

                eventSource.addEventListener('complete', () => {
                    eventSource.close();
                    persistUiState();
                });

                eventSource.addEventListener('error', (e) => {
                    let message = "Connection lost";
                    if (e && typeof e.data === 'string') {
                        try {
                            const data = JSON.parse(e.data);
                            message = data.content || message;
                        } catch (err) {
                            message = e.data || message;
                        }
                    }
                    eventSource.close();
                    appendRefineSystemMsg(`Error: ${message}`);
                });

            } catch (e) {
                appendRefineSystemMsg("Error sending request: " + e);
            }
        }

        window.changeRefineSlide = function (offset) {
            if (!currentRefineContext) return;
            const session = ensureRefineSession(currentRefineContext);
            if (!session.preview || session.preview.kind !== 'slides') return;
            session.preview.slideIndex = Math.max(
                0,
                Math.min((session.preview.slides || []).length - 1, (session.preview.slideIndex || 0) + offset)
            );
            renderRefineSlidePreview(session);
            persistUiState();
        };

        function appendRefineSystemMsg(text) {
            const box = document.createElement('div');
            box.className = 'agent-box';
            box.innerHTML = `<div class="agent-header">System</div><div class="agent-body system-msg-body">${text}</div>`;
            refineChatHistory.appendChild(box);
            refreshLastSystemMsgBody();
            refineChatHistory.scrollTop = refineChatHistory.scrollHeight;
            syncCurrentRefineSessionFromDom();
            persistUiState();
        }

        function updateRefineSystemMsg(text) {
            if (lastSystemMsgBody) {
                lastSystemMsgBody.textContent = text;
            } else {
                appendRefineSystemMsg(text);
                return;
            }
            syncCurrentRefineSessionFromDom();
            persistUiState();
        }

        async function startGeneration() {
            const query = userInput.value.trim();
            if (!query) return;

            // Reset UI
            taskList.innerHTML = '<div style="text-align:center; padding:10px;">Initializing Plan...</div>';
            feedbackModal.style.display = 'none';
            currentRunId = null;
            rebuildTaskMapFromDom();

            // Render User Message
            appendUserMessage(query);
            userInput.value = '';
            persistUiState();

            // Gather Config
            const config = {
                video: document.getElementById('check-video').checked,
                slides: document.getElementById('check-slides').checked,
                code: document.getElementById('check-code').checked,
                quizzes: document.getElementById('check-quizzes').checked
            };

            // Upload Files First
            const fileInput = document.getElementById('file-upload');
            let uploadedFiles = [];
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                for (let i = 0; i < fileInput.files.length; i++) {
                    formData.append('files', fileInput.files[i]);
                }
                appendSystemMessage('System', 'Uploading files...');
                try {
                    const uploadResp = await fetch('/upload', { method: 'POST', body: formData });
                    const uploadResult = await uploadResp.json();
                    uploadedFiles = uploadResult.paths;
                } catch (e) {
                    appendSystemMessage('Error', 'Upload failed: ' + e);
                    return;
                }
            }

            // Start SSE
            const queryParams = new URLSearchParams({
                topic: query,
                files: JSON.stringify(uploadedFiles),
                ...config
            });

            const eventSource = new EventSource(`/stream_generate?${queryParams.toString()}`);

            // Keep track of run_id from the first plan event?
            // Actually stream_generate doesn't send run_id explicitly in event structure usually, 
            // but we need it for Refinement.
            // Let's assume 'plan' event sends it or we extract from logs.
            // UPDATED: Let's modify the backend to send run_id in the 'plan' event.

            eventSource.addEventListener('plan', (e) => {
                const data = JSON.parse(e.data);
                if (data.run_id) currentRunId = data.run_id;
                renderTaskPlan(data.steps);
                persistUiState();
            });

            eventSource.addEventListener('step_start', (e) => {
                const data = JSON.parse(e.data);
                updateTaskStatus(data.id, 'active');
                createAgentBox(data.id, data.name, data.agent);
                persistUiState();
            });

            eventSource.addEventListener('log', (e) => {
                const data = JSON.parse(e.data);
                appendLog(data.id, data.content);
                persistUiState();
            });

            eventSource.addEventListener('artifact', (e) => {
                const data = JSON.parse(e.data);
                renderArtifact(data.id, data, currentRunId, null);
                if (data.type === 'video') {
                    completeVideoProgress(data.id, 'Video ready.');
                }
                persistUiState();
            });

            eventSource.addEventListener('video_progress', (e) => {
                const data = JSON.parse(e.data);
                updateVideoProgress(data.id, data);
                persistUiState();
            });

            eventSource.addEventListener('quiz', (e) => {
                const data = JSON.parse(e.data);
                renderQuiz(data.id, data.content);
                persistUiState();
            });

            eventSource.addEventListener('step_complete', (e) => {
                const data = JSON.parse(e.data);
                updateTaskStatus(data.id, data.status); // 'success' or 'fail'
                if (data.status === 'fail') {
                    failVideoProgress(data.id, 'Video generation failed.');
                }
                persistUiState();
            });

            eventSource.addEventListener('workflow_complete', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.run_id && !currentRunId) currentRunId = data.run_id;
                } catch (_) {}
                feedbackModal.style.display = 'block';
                eventSource.close();
                persistUiState();
            });

            eventSource.addEventListener('error', (e) => {
                console.error("EventSource failed:", e);
                try {
                    const data = JSON.parse(e.data);
                    appendSystemMessage('Error', data.content || "Connection lost.");
                } catch (x) {
                    appendSystemMessage('Error', "Stream connection closed.");
                }
                eventSource.close();
                persistUiState();
            });
        }

        // --- RENDERERS ---

        function appendUserMessage(text) {
            const box = document.createElement('div');
            box.className = 'agent-box user';
            box.innerHTML = `
            <div class="agent-header">User</div>
            <div class="agent-body">${text}</div>
        `;
            messageContainer.appendChild(box);
            scrollToBottom();
            persistUiState();
        }

        function appendSystemMessage(title, text) {
            const box = document.createElement('div');
            box.className = 'agent-box';
            box.innerHTML = `
            <div class="agent-header">${title}</div>
            <div class="agent-body">${text}</div>
        `;
            messageContainer.appendChild(box);
            scrollToBottom();
            persistUiState();
        }

        function renderTaskPlan(steps) {
            taskList.innerHTML = '';
            currentTaskMap = {};

            steps.forEach((step, index) => {
                const el = document.createElement('div');
                el.className = 'task-step pending';
                el.id = `sidebar-${step.id}`;
                el.innerHTML = `
                <div class="step-header">
                    <span>${index + 1}. ${step.name}</span>
                    <span class="step-status-icon">○</span>
                </div>
                <div class="step-agent">${step.agent}</div>
            `;
                taskList.appendChild(el);
                currentTaskMap[step.id] = el;
            });
            persistUiState();
        }

        function updateTaskStatus(taskId, status) {
            const el = currentTaskMap[taskId];
            if (!el) return;

            el.className = `task-step ${status}`; // pending, active, success, fail
            const icon = el.querySelector('.step-status-icon');

            if (status === 'active') icon.textContent = '▶';
            else if (status === 'success') icon.textContent = '✔';
            else if (status === 'fail') icon.textContent = '✘';
            persistUiState();
        }

        function createAgentBox(taskId, taskName, agentName) {
            currentAgentId = taskId;
            const box = document.createElement('div');
            box.className = 'agent-box';
            box.id = `box-${taskId}`;
            // Store agent type in data attribute for later access
            box.dataset.agentType = agentName;
            const videoProgressHtml = agentName === 'video' ? `
                <div class="video-progress-card" id="video-progress-${taskId}">
                    <div class="video-progress-topline">
                        <span class="video-progress-stage" id="video-stage-${taskId}">prepare</span>
                        <span class="video-progress-percent" id="video-percent-${taskId}">0%</span>
                    </div>
                    <div class="video-progress-track">
                        <div class="video-progress-fill" id="video-fill-${taskId}"></div>
                    </div>
                    <div class="video-progress-detail" id="video-detail-${taskId}">Waiting for video progress...</div>
                    <div class="video-stage-list" id="video-stage-list-${taskId}">
                        ${VIDEO_STAGE_ORDER.map((stage) => `<div class="video-stage-step" data-stage="${stage}">${VIDEO_STAGE_LABELS[stage]}</div>`).join('')}
                    </div>
                </div>
            ` : '';
            box.innerHTML = `
            <div class="agent-header">
                <span>${taskName}</span>
                <span style="font-size:0.8em; opacity:0.7;">${agentName.toUpperCase()}</span>
            </div>
            <div class="agent-body">
                <div class="status-text">Processing...</div>
                ${videoProgressHtml}
                <div class="log-toggle" onclick="toggleLog('${taskId}')">Show Logs</div>
                <div class="log-container" id="log-${taskId}"></div>
                <div class="artifact-grid" id="art-${taskId}"></div>
            </div>
            `;
            messageContainer.appendChild(box);
            currentAgentBox = box;
            scrollToBottom();
            persistUiState();
        }

        function appendLog(taskId, content) {
            const logDiv = document.getElementById(`log-${taskId}`);
            if (!logDiv) return;
            logDiv.textContent += content + '\\n';

            // Update status text if it's the active box
            const box = document.getElementById(`box-${taskId}`);
            if (box) {
                const status = box.querySelector('.status-text');
                if (status) status.textContent = content.substring(0, 50) + "...";
            }
            persistUiState();
        }

        function updateVideoProgress(taskId, payload) {
            const box = document.getElementById(`box-${taskId}`);
            if (!box || box.dataset.agentType !== 'video') return;

            const card = document.getElementById(`video-progress-${taskId}`);
            const stageEl = document.getElementById(`video-stage-${taskId}`);
            const percentEl = document.getElementById(`video-percent-${taskId}`);
            const fillEl = document.getElementById(`video-fill-${taskId}`);
            const detailEl = document.getElementById(`video-detail-${taskId}`);
            const statusEl = box.querySelector('.status-text');
            if (!card || !stageEl || !percentEl || !fillEl || !detailEl || !statusEl) return;

            const stageName = payload.stage || 'prepare';
            const percent = Math.max(0, Math.min(100, Number(payload.overall_progress || 0)));
            const detail = payload.message || (payload.total ? `${payload.current || 0} / ${payload.total}` : 'Working...');

            card.classList.remove('is-error', 'is-complete', 'is-indeterminate');
            if (payload.indeterminate) {
                card.classList.add('is-indeterminate');
            }
            if (payload.status === 'error') {
                card.classList.add('is-error');
            }

            stageEl.textContent = VIDEO_STAGE_LABELS[stageName] || stageName;
            percentEl.textContent = `${Math.round(percent)}%`;
            fillEl.style.width = `${percent}%`;
            detailEl.textContent = detail;
            statusEl.textContent = detail;

            const stageList = document.getElementById(`video-stage-list-${taskId}`);
            if (!stageList) return;
            const stageIndex = VIDEO_STAGE_ORDER.indexOf(stageName);
            stageList.querySelectorAll('.video-stage-step').forEach((node, index) => {
                node.classList.remove('active', 'done', 'error');
                if (payload.status === 'error' && index === stageIndex) {
                    node.classList.add('error');
                } else if (index < stageIndex) {
                    node.classList.add('done');
                } else if (index === stageIndex) {
                    node.classList.add('active');
                }
            });
            persistUiState();
        }

        function completeVideoProgress(taskId, detailText) {
            const box = document.getElementById(`box-${taskId}`);
            if (!box || box.dataset.agentType !== 'video') return;

            const card = document.getElementById(`video-progress-${taskId}`);
            const percentEl = document.getElementById(`video-percent-${taskId}`);
            const fillEl = document.getElementById(`video-fill-${taskId}`);
            const detailEl = document.getElementById(`video-detail-${taskId}`);
            const statusEl = box.querySelector('.status-text');
            const stageList = document.getElementById(`video-stage-list-${taskId}`);
            if (!card || !percentEl || !fillEl || !detailEl || !statusEl || !stageList) return;

            card.classList.remove('is-error', 'is-indeterminate');
            card.classList.add('is-complete');
            percentEl.textContent = '100%';
            fillEl.style.width = '100%';
            detailEl.textContent = detailText;
            statusEl.textContent = detailText;
            stageList.querySelectorAll('.video-stage-step').forEach((node) => {
                node.classList.remove('active', 'error');
                node.classList.add('done');
            });
            persistUiState();
        }

        function failVideoProgress(taskId, detailText) {
            const box = document.getElementById(`box-${taskId}`);
            if (!box || box.dataset.agentType !== 'video') return;

            const card = document.getElementById(`video-progress-${taskId}`);
            const detailEl = document.getElementById(`video-detail-${taskId}`);
            const statusEl = box.querySelector('.status-text');
            if (!card || !detailEl || !statusEl) return;

            card.classList.remove('is-complete', 'is-indeterminate');
            card.classList.add('is-error');
            detailEl.textContent = detailText;
            statusEl.textContent = detailText;
            persistUiState();
        }

        window.toggleLog = function (taskId) {
            const log = document.getElementById(`log-${taskId}`);
            if (log.style.display === 'block') {
                log.style.display = 'none';
            } else {
                log.style.display = 'block';
            }
            persistUiState();
        }

        function buildArtifactCard(meta) {
            const card = document.createElement('div');
            card.className = 'artifact-card';
            card.dataset.artifactSlot = meta.slot;
            card.dataset.artifactPath = meta.rawPath;

            let icon = '📄';
            if (meta.type === 'video') icon = '🎬';
            if (meta.type === 'presentation') icon = '📊';
            if (meta.type === 'code') icon = '💻';

            const downloadArtifact = shouldDownloadArtifact(meta.ext);
            const fileLink = document.createElement('a');
            fileLink.href = buildArtifactAccessUrl(meta.rawPath, { download: downloadArtifact });
            fileLink.className = 'artifact-link';
            fileLink.target = downloadArtifact ? '_self' : '_blank';
            if (downloadArtifact) {
                fileLink.setAttribute('download', meta.name);
            }

            const iconEl = document.createElement('div');
            iconEl.className = 'artifact-icon';
            iconEl.textContent = icon;
            fileLink.appendChild(iconEl);

            const nameEl = document.createElement('div');
            nameEl.className = 'artifact-name';
            nameEl.textContent = meta.name;
            fileLink.appendChild(nameEl);

            const hintEl = document.createElement('div');
            hintEl.className = 'artifact-hint';
            hintEl.textContent = downloadArtifact ? 'Click to download' : 'Click to open';
            fileLink.appendChild(hintEl);

            card.appendChild(fileLink);

            const refineButton = document.createElement('button');
            refineButton.className = 'refine-btn';
            refineButton.textContent = 'Refine ✏️';
            if (meta.runId) {
                refineButton.dataset.runId = meta.runId;
                refineButton.dataset.taskId = meta.taskId;
                refineButton.dataset.agent = meta.agentName;
                refineButton.dataset.artifactName = meta.name;
                refineButton.dataset.artifactPath = meta.rawPath;
            } else {
                refineButton.disabled = true;
                refineButton.title = 'Run ID unavailable';
            }
            card.appendChild(refineButton);

            return card;
        }

        function renderArtifact(taskId, artifact, runId, agentNameOverride) {
            const artGrid = document.getElementById(`art-${taskId}`);
            if (!artGrid) return;

            const box = document.getElementById(`box-${taskId}`);
            const agentName = agentNameOverride || (box ? box.dataset.agentType : 'unknown');
            const meta = normalizeArtifactPayload(taskId, artifact, runId, agentName);
            const card = buildArtifactCard(meta);
            const existing = artGrid.querySelector(`.artifact-card[data-artifact-slot="${meta.slot}"]`);

            if (existing) {
                existing.replaceWith(card);
            } else {
                artGrid.appendChild(card);
            }

            if (box) box.querySelector('.status-text').textContent = "Asset Generated.";
            persistUiState();
        }

        function renderQuiz(taskId, quizContent) {
            const artGrid = document.getElementById(`art-${taskId}`);
            if (!artGrid) return;

            const container = document.createElement('div');
            container.className = 'quiz-container';
            container.style.width = '100%';

            let html = '';
            if (quizContent.questions) {
                quizContent.questions.forEach((q, idx) => {
                    html += `
                    <div class="quiz-question">${idx + 1}. ${q.question}</div>
                    <div class="quiz-options">
                        ${(q.options || []).map(opt => `<div class="quiz-option" onclick="this.classList.toggle('selected')">${opt}</div>`).join('')}
                    </div>
                    <hr style="border:0; border-bottom:1px solid rgba(255,255,255,0.1); margin:15px 0;">
                `;
                });
            }

            container.innerHTML = html || 'No questions found.';
            artGrid.appendChild(container);
            persistUiState();
        }

        function scrollToBottom() {
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

        restoreUiState();
    </script>
</body>

</html>
