<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pedia - Agent Orchestrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <h1>AI Pedia</h1>

            <div class="config-panel">
                <div class="section-title">Output Config</div>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-video" checked>
                        <span>Video Explanation</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-slides" checked>
                        <span>Presentation Slides</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-code" checked>
                        <span>Code Example</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="check-quizzes" checked>
                        <span>Interactive Quiz</span>
                    </label>

                    <div class="section-title" style="margin-top:20px;">Context</div>
                    <input type="file" id="file-upload" multiple style="color: white; font-size: 0.8em;">
                </div>
            </div>

            <div class="task-panel">
                <div class="section-title">Task Progression</div>
                <div id="task-list">
                    <div style="text-align:center; color:#666; font-size:0.9em; padding:20px;">
                        No active tasks.
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="chat-area" id="message-container">
                <div class="agent-box">
                    <div class="agent-header">System</div>
                    <div class="agent-body">Welcome to AI Pedia. Configure your output needs and ask a question to
                        begin.</div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input"
                    placeholder="Ask about a topic (e.g., 'Transformer Architecture')...">
                <button id="send-btn">Generate</button>
            </div>
        </div>
    </div>

    <div id="feedback-modal">
        ✅ Workflow Complete! Click to Rate
    </div>

    <div id="refine-modal" class="refine-modal">
        <div class="refine-content">
            <div class="refine-header">
                <span id="refine-title">Refining Artifact</span>
                <span class="close-refine" onclick="closeRefineModal()">&times;</span>
            </div>
            <div class="refine-body">
                <div class="refine-left" id="refine-preview">
                    <!-- Preview content goes here (Code block, Slide image, etc.) -->
                    <div style="color:#888; text-align:center; padding-top:100px;">Preview Loading...</div>
                </div>
                <div class="refine-right">
                    <div class="refine-chat-history" id="refine-chat-history">
                        <div class="agent-box">
                            <div class="agent-header">System</div>
                            <div class="agent-body">You are refining this specific artifact. Ask for changes here.</div>
                        </div>
                    </div>
                    <div class="refine-input-area">
                        <textarea id="refine-input"
                            placeholder="Describe your changes... (e.g., 'Change the chart color to red')"></textarea>
                        <button id="refine-send-btn" onclick="sendRefinement()">Refine</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sendBtn = document.getElementById('send-btn');
        const userInput = document.getElementById('user-input');
        const messageContainer = document.getElementById('message-container');
        const taskList = document.getElementById('task-list');
        const feedbackModal = document.getElementById('feedback-modal');
        const refineModal = document.getElementById('refine-modal');
        const refineChatHistory = document.getElementById('refine-chat-history');
        const refineInput = document.getElementById('refine-input');

        sendBtn.addEventListener('click', startGeneration);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGeneration();
        });

        // Refine Input Enter Key
        refineInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendRefinement();
            }
        });

        feedbackModal.addEventListener('click', () => {
            feedbackModal.style.display = 'none';
        });

        let currentTaskMap = {}; // Maps task_id to DOM Element (Sidebar)
        let currentAgentBox = null;
        let currentAgentId = null;

        // --- REFINEMENT STATE ---
        let currentRefineContext = null; // { run_id, task_id, agent, artifact_type, content_url }

        function resolveGeneratedUrl(rawUrl) {
            if (!rawUrl) return '#';
            if (rawUrl.startsWith('/generated/') || rawUrl.startsWith('http://') || rawUrl.startsWith('https://')) {
                return rawUrl;
            }
            if (rawUrl.includes('generated_code')) {
                const parts = rawUrl.split('generated_code');
                const relative = (parts[1] || '').replace(/\\+/g, '/');
                return '/generated' + relative;
            }
            return rawUrl;
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function renderRefinePreview(artifactUrl) {
            const previewContainer = document.getElementById('refine-preview');
            const cacheBustedUrl = artifactUrl.includes('?') ? `${artifactUrl}&t=${Date.now()}` : `${artifactUrl}?t=${Date.now()}`;
            previewContainer.innerHTML = '<div style="color:#aaa; text-align:center; padding-top:50px;">Loading Preview...</div>';

            if (artifactUrl.endsWith('.png') || artifactUrl.endsWith('.jpg') || artifactUrl.endsWith('.jpeg')) {
                previewContainer.innerHTML = `<img src="${cacheBustedUrl}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
                return;
            }

            if (artifactUrl.endsWith('.mp4')) {
                previewContainer.innerHTML = `<video controls src="${cacheBustedUrl}" style="width:100%; max-height:100%;"></video>`;
                return;
            }

            if (artifactUrl.endsWith('.py') || artifactUrl.endsWith('.txt') || artifactUrl.endsWith('.json') || artifactUrl.endsWith('.md')) {
                fetch(cacheBustedUrl).then(r => r.text()).then(text => {
                    previewContainer.innerHTML = `<pre style="text-align:left; background:#1e1e1e; padding:10px; border-radius:5px; overflow:auto; height:100%; margin:0;"><code>${escapeHtml(text)}</code></pre>`;
                }).catch(e => {
                    previewContainer.innerHTML = `<div style="color:red">Failed to load preview: ${escapeHtml(e)}</div>`;
                });
                return;
            }

            previewContainer.innerHTML = `<div style="text-align:center; padding-top:50px; color:#fff;">
                Preview not available for this file type.<br>
                <a href="${cacheBustedUrl}" target="_blank" style="color:#4a9eff">Click to open</a>
             </div>`;
        }

        function openRefineModal(runId, taskId, agent, artifact, artifactUrl) {
            currentRefineContext = { run_id: runId, task_id: taskId, agent: agent, url: artifactUrl };

            // 1. Setup UI
            refineModal.style.display = 'flex';
            document.getElementById('refine-title').textContent = `Refining: ${taskId} (${agent})`;
            refineChatHistory.innerHTML = `
                <div class="agent-box">
                    <div class="agent-header">System</div>
                    <div class="agent-body">You are refining this specific artifact. Ask for changes here.</div>
                </div>
            `;
            refineInput.value = '';

            // 2. Load Preview
            const previewContainer = document.getElementById('refine-preview');
            previewContainer.innerHTML = '<div style="color:#aaa; text-align:center; padding-top:50px;">Loading Preview...</div>';
            renderRefinePreview(artifactUrl);
        }

        function closeRefineModal() {
            refineModal.style.display = 'none';
            currentRefineContext = null;
        }

        async function sendRefinement() {
            const text = refineInput.value.trim();
            if (!text || !currentRefineContext) return;

            // 1. UI Update
            const userBox = document.createElement('div');
            userBox.className = 'agent-box user';
            userBox.innerHTML = `<div class="agent-header">User</div><div class="agent-body">${text}</div>`;
            refineChatHistory.appendChild(userBox);
            refineInput.value = '';

            // Scroll to bottom
            refineChatHistory.scrollTop = refineChatHistory.scrollHeight;

            // 2. Send to Backend
            appendRefineSystemMsg("Thinking...");

            try {
                // Determine API endpoint - we need a new streaming endpoint for refinement
                // '/refine_stream'
                const params = new URLSearchParams({
                    run_id: currentRefineContext.run_id,
                    task_id: currentRefineContext.task_id,
                    feedback: text
                });

                const eventSource = new EventSource(`/refine_stream?${params.toString()}`);

                let currentMsgBody = null;

                eventSource.onmessage = function (event) {
                    // Start of message
                };

                eventSource.addEventListener('chunk', (e) => {
                    // Update the last system message or create new one?
                    // Stream tokens logic for chat experience
                    // For simplicity, let's just show status log or final result
                });

                eventSource.addEventListener('log', (e) => {
                    const data = JSON.parse(e.data);
                    updateRefineSystemMsg(data.content);
                });

                eventSource.addEventListener('artifact', (e) => {
                    const data = JSON.parse(e.data);
                    const newUrl = resolveGeneratedUrl(data.url);

                    // Allow small delay for file write
                    setTimeout(() => {
                        // Update Context URL so subsequent refinements use THIS version
                        if (currentRefineContext) {
                            currentRefineContext.url = newUrl;
                        }
                        if (refineModal.style.display === 'flex') {
                            renderRefinePreview(newUrl);
                        }
                    }, 1000);

                    appendRefineSystemMsg(`✅ Updated Artifact Generated.`);
                });

                eventSource.addEventListener('complete', () => {
                    eventSource.close();
                });

                eventSource.addEventListener('error', (e) => {
                    let message = "Connection lost";
                    if (e && typeof e.data === 'string') {
                        try {
                            const data = JSON.parse(e.data);
                            message = data.content || message;
                        } catch (err) {
                            message = e.data || message;
                        }
                    }
                    eventSource.close();
                    appendRefineSystemMsg(`Error: ${message}`);
                });

            } catch (e) {
                appendRefineSystemMsg("Error sending request: " + e);
            }
        }

        let lastSystemMsgBody = null;
        function appendRefineSystemMsg(text) {
            const box = document.createElement('div');
            box.className = 'agent-box';
            box.innerHTML = `<div class="agent-header">System</div><div class="agent-body system-msg-body">${text}</div>`;
            refineChatHistory.appendChild(box);
            lastSystemMsgBody = box.querySelector('.system-msg-body');
            refineChatHistory.scrollTop = refineChatHistory.scrollHeight;
        }

        function updateRefineSystemMsg(text) {
            if (lastSystemMsgBody) {
                lastSystemMsgBody.textContent = text;
            } else {
                appendRefineSystemMsg(text);
            }
        }

        async function startGeneration() {
            const query = userInput.value.trim();
            if (!query) return;

            // Reset UI
            taskList.innerHTML = '<div style="text-align:center; padding:10px;">Initializing Plan...</div>';
            feedbackModal.style.display = 'none';

            // Render User Message
            appendUserMessage(query);
            userInput.value = '';

            // Gather Config
            const config = {
                video: document.getElementById('check-video').checked,
                slides: document.getElementById('check-slides').checked,
                code: document.getElementById('check-code').checked,
                quizzes: document.getElementById('check-quizzes').checked
            };

            // Upload Files First
            const fileInput = document.getElementById('file-upload');
            let uploadedFiles = [];
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                for (let i = 0; i < fileInput.files.length; i++) {
                    formData.append('files', fileInput.files[i]);
                }
                appendSystemMessage('System', 'Uploading files...');
                try {
                    const uploadResp = await fetch('/upload', { method: 'POST', body: formData });
                    const uploadResult = await uploadResp.json();
                    uploadedFiles = uploadResult.paths;
                } catch (e) {
                    appendSystemMessage('Error', 'Upload failed: ' + e);
                    return;
                }
            }

            // Start SSE
            const queryParams = new URLSearchParams({
                topic: query,
                files: JSON.stringify(uploadedFiles),
                ...config
            });

            const eventSource = new EventSource(`/stream_generate?${queryParams.toString()}`);

            // Keep track of run_id from the first plan event?
            // Actually stream_generate doesn't send run_id explicitly in event structure usually, 
            // but we need it for Refinement.
            // Let's assume 'plan' event sends it or we extract from logs.
            // UPDATED: Let's modify the backend to send run_id in the 'plan' event.

            let globalRunId = null;

            eventSource.addEventListener('plan', (e) => {
                const data = JSON.parse(e.data);
                if (data.run_id) globalRunId = data.run_id; // Capture Run ID
                renderTaskPlan(data.steps);
            });

            eventSource.addEventListener('step_start', (e) => {
                const data = JSON.parse(e.data);
                updateTaskStatus(data.id, 'active');
                createAgentBox(data.id, data.name, data.agent);
            });

            eventSource.addEventListener('log', (e) => {
                const data = JSON.parse(e.data);
                appendLog(data.id, data.content);
            });

            eventSource.addEventListener('artifact', (e) => {
                const data = JSON.parse(e.data);
                // Pass globalRunId to renderArtifact
                renderArtifact(data.id, data, globalRunId, currentAgentId);
            });

            eventSource.addEventListener('quiz', (e) => {
                const data = JSON.parse(e.data);
                renderQuiz(data.id, data.content);
            });

            eventSource.addEventListener('step_complete', (e) => {
                const data = JSON.parse(e.data);
                updateTaskStatus(data.id, data.status); // 'success' or 'fail'
            });

            eventSource.addEventListener('workflow_complete', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.run_id && !globalRunId) globalRunId = data.run_id;
                } catch (_) {}
                feedbackModal.style.display = 'block';
                eventSource.close();
            });

            eventSource.addEventListener('error', (e) => {
                console.error("EventSource failed:", e);
                try {
                    const data = JSON.parse(e.data);
                    appendSystemMessage('Error', data.content || "Connection lost.");
                } catch (x) {
                    appendSystemMessage('Error', "Stream connection closed.");
                }
                eventSource.close();
            });
        }

        // --- RENDERERS ---

        function appendUserMessage(text) {
            const box = document.createElement('div');
            box.className = 'agent-box user';
            box.innerHTML = `
            <div class="agent-header">User</div>
            <div class="agent-body">${text}</div>
        `;
            messageContainer.appendChild(box);
            scrollToBottom();
        }

        function appendSystemMessage(title, text) {
            const box = document.createElement('div');
            box.className = 'agent-box';
            box.innerHTML = `
            <div class="agent-header">${title}</div>
            <div class="agent-body">${text}</div>
        `;
            messageContainer.appendChild(box);
            scrollToBottom();
        }

        function renderTaskPlan(steps) {
            taskList.innerHTML = '';
            currentTaskMap = {};

            steps.forEach((step, index) => {
                const el = document.createElement('div');
                el.className = 'task-step pending';
                el.id = `sidebar-${step.id}`;
                el.innerHTML = `
                <div class="step-header">
                    <span>${index + 1}. ${step.name}</span>
                    <span class="step-status-icon">○</span>
                </div>
                <div class="step-agent">${step.agent}</div>
            `;
                taskList.appendChild(el);
                currentTaskMap[step.id] = el;
            });
        }

        function updateTaskStatus(taskId, status) {
            const el = currentTaskMap[taskId];
            if (!el) return;

            el.className = `task-step ${status}`; // pending, active, success, fail
            const icon = el.querySelector('.step-status-icon');

            if (status === 'active') icon.textContent = '▶';
            else if (status === 'success') icon.textContent = '✔';
            else if (status === 'fail') icon.textContent = '✘';
        }

        function createAgentBox(taskId, taskName, agentName) {
            currentAgentId = taskId;
            const box = document.createElement('div');
            box.className = 'agent-box';
            box.id = `box-${taskId}`;
            // Store agent type in data attribute for later access
            box.dataset.agentType = agentName;
            box.innerHTML = `
            <div class="agent-header">
                <span>${taskName}</span>
                <span style="font-size:0.8em; opacity:0.7;">${agentName.toUpperCase()}</span>
            </div>
            <div class="agent-body">
                <div class="status-text">Processing...</div>
                <div class="log-toggle" onclick="toggleLog('${taskId}')">Show Logs</div>
                <div class="log-container" id="log-${taskId}"></div>
                <div class="artifact-grid" id="art-${taskId}"></div>
            </div>
        `;
            messageContainer.appendChild(box);
            currentAgentBox = box;
            scrollToBottom();
        }

        function appendLog(taskId, content) {
            const logDiv = document.getElementById(`log-${taskId}`);
            if (!logDiv) return;
            logDiv.textContent += content + '\\n';

            // Update status text if it's the active box
            const box = document.getElementById(`box-${taskId}`);
            if (box) {
                const status = box.querySelector('.status-text');
                if (status) status.textContent = content.substring(0, 50) + "...";
            }
        }

        window.toggleLog = function (taskId) {
            const log = document.getElementById(`log-${taskId}`);
            if (log.style.display === 'block') {
                log.style.display = 'none';
            } else {
                log.style.display = 'block';
            }
        }

        function renderArtifact(taskId, artifact, runId, agentId) {
            const artGrid = document.getElementById(`art-${taskId}`);
            if (!artGrid) return;

            // Get Agent Name from box
            const box = document.getElementById(`box-${taskId}`);
            const agentName = box ? box.dataset.agentType : 'unknown';

            const card = document.createElement('div');
            card.className = 'artifact-card'; // Changed from 'a' to 'div' to contain buttons

            // Link logic matching the /generated mount
            const fileUrl = resolveGeneratedUrl(artifact.url);

            // Icons
            let icon = '📄';
            if (artifact.type === 'video') icon = '🎬';
            if (artifact.type === 'presentation') icon = '📊';
            if (artifact.type === 'code') icon = '💻';

            const refineButton = runId
                ? `<button class="refine-btn" onclick="openRefineModal('${runId}', '${taskId}', '${agentName}', '${artifact.name}', '${fileUrl}')">Refine ✏️</button>`
                : `<button class="refine-btn" disabled title="Run ID unavailable">Refine ✏️</button>`;

            card.innerHTML = `
                <a href="${fileUrl}" target="_blank" style="text-decoration:none; color:inherit; display:block; margin-bottom:10px;">
                    <div class="artifact-icon">${icon}</div>
                    <div class="artifact-name">${artifact.name}</div>
                </a>
                ${refineButton}
            `;

            artGrid.appendChild(card);

            if (box) box.querySelector('.status-text').textContent = "Asset Generated.";
        }

        function renderQuiz(taskId, quizContent) {
            const artGrid = document.getElementById(`art-${taskId}`);
            if (!artGrid) return;

            const container = document.createElement('div');
            container.className = 'quiz-container';
            container.style.width = '100%';

            let html = '';
            if (quizContent.questions) {
                quizContent.questions.forEach((q, idx) => {
                    html += `
                    <div class="quiz-question">${idx + 1}. ${q.question}</div>
                    <div class="quiz-options">
                        ${(q.options || []).map(opt => `<div class="quiz-option" onclick="this.classList.toggle('selected')">${opt}</div>`).join('')}
                    </div>
                    <hr style="border:0; border-bottom:1px solid rgba(255,255,255,0.1); margin:15px 0;">
                `;
                });
            }

            container.innerHTML = html || 'No questions found.';
            artGrid.appendChild(container);
        }

        function scrollToBottom() {
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }
    </script>
</body>

</html>
